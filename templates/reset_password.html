{% extends 'base.html' %}
{% block title %}Reset Password — ADREAN{% endblock %}
{% block extra_head %}
<style>
  .auth-wrap { min-height:85vh; display:flex; align-items:center; justify-content:center; padding:3rem 1rem; }
  .auth-box { width:100%; max-width:440px; }
  .auth-title { font-family:'Bebas Neue',sans-serif; font-size:2.5rem; letter-spacing:3px; margin-bottom:0.25rem; }
  .auth-title span { color:var(--accent); }
  .auth-sub { color:var(--muted); margin-bottom:2rem; font-size:0.95rem; }
  .auth-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:2rem; }
  .auth-footer { text-align:center; margin-top:1.5rem; color:var(--muted); font-size:0.9rem; }
  .auth-footer a { color:var(--accent); text-decoration:none; font-weight:700; }
  .strength-bar { height:4px; border-radius:2px; background:var(--border); margin-top:0.4rem; overflow:hidden; }
  .strength-fill { height:100%; border-radius:2px; width:0%; transition:width 0.3s, background 0.3s; }
  .strength-label { font-size:0.78rem; color:var(--muted); margin-top:0.25rem; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <h1 class="auth-title">RESET <span>PASSWORD</span></h1>
    <p class="auth-sub">Choose a strong new password for your account.</p>

    <div class="auth-card">
      <form method="POST">
        <div class="form-group">
          <label>New Password</label>
          <input class="form-control" type="password" name="password" id="pw" placeholder="min 6 characters" minlength="6" required autofocus>
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <div class="strength-label" id="strength-label">Enter a password</div>
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <input class="form-control" type="password" name="confirm_password" id="pw2" placeholder="repeat password" required>
          <div id="match-label" style="font-size:0.78rem;margin-top:0.25rem;color:var(--muted);"></div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.75rem;">
          Reset Password
        </button>
      </form>
    </div>

    <div class="auth-footer">
      <a href="{{ url_for('login') }}">← Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  const pw = document.getElementById('pw');
  const pw2 = document.getElementById('pw2');
  const fill = document.getElementById('strength-fill');
  const label = document.getElementById('strength-label');
  const matchLabel = document.getElementById('match-label');

  pw.addEventListener('input', () => {
    const v = pw.value;
    let score = 0;
    if (v.length >= 6) score++;
    if (v.length >= 10) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    const levels = [
      { w: '0%',   c: 'var(--border)',   t: 'Enter a password' },
      { w: '25%',  c: 'var(--accent2)',  t: 'Weak' },
      { w: '50%',  c: '#f0a500',         t: 'Fair' },
      { w: '75%',  c: '#3fb950',         t: 'Good' },
      { w: '100%', c: 'var(--accent)',   t: 'Strong 💪' },
    ];
    const lvl = levels[Math.min(score, 4)];
    fill.style.width = lvl.w;
    fill.style.background = lvl.c;
    label.textContent = lvl.t;
    label.style.color = lvl.c;
    checkMatch();
  });

  pw2.addEventListener('input', checkMatch);

  function checkMatch() {
    if (!pw2.value) { matchLabel.textContent = ''; return; }
    if (pw.value === pw2.value) {
      matchLabel.textContent = '✓ Passwords match';
      matchLabel.style.color = 'var(--accent)';
    } else {
      matchLabel.textContent = '✗ Passwords do not match';
      matchLabel.style.color = 'var(--accent2)';
    }
  }
</script>
{% endblock %}
