<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — ADREAN</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#050709; --surface:#0a0d13; --border:#1c2333; --accent:#00ffcc; --accent2:#ff3e6c; --text:#cdd9e5; --muted:#636e7b; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Rajdhani',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse at 50% 50%, rgba(0,255,204,0.04) 0%, transparent 70%); pointer-events:none; }
    .login-box { width:100%; max-width:400px; padding:1.5rem; position:relative; z-index:1; }
    .login-logo { font-family:'Bebas Neue',sans-serif; font-size:3rem; letter-spacing:5px; color:var(--accent); text-align:center; text-shadow:0 0 30px rgba(0,255,204,0.5); margin-bottom:0.25rem; }
    .login-logo span { color:var(--accent2); }
    .login-sub { text-align:center; color:var(--muted); font-size:0.85rem; letter-spacing:2px; text-transform:uppercase; margin-bottom:2rem; font-family:'Share Tech Mono',monospace; }
    .login-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:2rem; }
    .form-group { margin-bottom:1.25rem; }
    .form-group label { display:block; font-weight:600; font-size:0.8rem; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:0.4rem; }
    .form-control { width:100%; padding:0.7rem 1rem; background:#111620; border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:'Rajdhani',sans-serif; font-size:1rem; transition:border-color 0.2s; }
    .form-control:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,255,204,0.1); }
    .btn-block { width:100%; padding:0.8rem; background:var(--accent); color:#000; font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; border:none; border-radius:6px; cursor:pointer; transition:box-shadow 0.2s; }
    .btn-block:hover { box-shadow:0 0 30px rgba(0,255,204,0.5); }
    .flash-area { margin-bottom:1rem; }
    .flash { padding:0.65rem 1rem; border-radius:6px; font-weight:600; border-left:4px solid var(--accent2); background:#111620; color:var(--accent2); font-size:0.9rem; }
    .hint { text-align:center; color:var(--muted); font-size:0.8rem; margin-top:1rem; font-family:'Share Tech Mono',monospace; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">ADRE<span>AN</span></div>
    <div class="login-sub">// Admin Control Panel</div>
    <div class="flash-area">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}
      {% endwith %}
    </div>
    <div class="login-card">
      <form method="POST">
        <div class="form-group">
          <label>Username</label>
          <input class="form-control" type="text" name="username" placeholder="admin" required autofocus>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input class="form-control" type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-block">Access Panel</button>
      </form>
    </div>
    <div class="hint">Default: admin / admin123</div>
  </div>
</body>
</html>
