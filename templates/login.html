{% extends 'base.html' %}
{% block title %}Login — ADREAN{% endblock %}
{% block extra_head %}
<style>
  .auth-wrap { min-height:85vh; display:flex; align-items:center; justify-content:center; padding:3rem 1rem; }
  .auth-box { width:100%; max-width:440px; }
  .auth-title { font-family:'Bebas Neue',sans-serif; font-size:2.5rem; letter-spacing:3px; margin-bottom:0.25rem; }
  .auth-title span { color:var(--accent); }
  .auth-sub { color:var(--muted); margin-bottom:2rem; font-size:0.95rem; }
  .auth-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:2rem; }
  .auth-footer { text-align:center; margin-top:1.5rem; color:var(--muted); font-size:0.9rem; }
  .auth-footer a { color:var(--accent); text-decoration:none; font-weight:700; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <h1 class="auth-title">WELCOME <span>BACK</span></h1>
    <p class="auth-sub">Sign in to your competitor account.</p>
    <div class="auth-card">
      <form method="POST">
        <div class="form-group">
          <label>Email</label>
          <input class="form-control" type="email" name="email" placeholder="you@email.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input class="form-control" type="password" name="password" required>
          <div style="text-align:right;margin-top:0.4rem;">
            <a href="{{ url_for('forgot_password') }}" style="font-size:0.82rem;color:var(--muted);text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">Forgot password?</a>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.75rem;">Login</button>
      </form>
    </div>
    <div class="auth-footer">New here? <a href="{{ url_for('register') }}">Create Account</a></div>
  </div>
</div>
{% endblock %}
